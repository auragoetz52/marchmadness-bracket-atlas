<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#040611" />
  <title>March Madness 2025 — Bracket Map</title>
  <meta name="description" content="A gorgeous, interactive map of the 2025 March Madness tournament." />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Atmospheric Background -->
  <div class="bg-orb bg-orb--a"></div>
  <div class="bg-orb bg-orb--b"></div>
  <div class="bg-grain"></div>
  <div class="bg-grid"></div>

  <!-- Main Map Viewport -->
  <main id="viewport" class="viewport">
    <div id="bracketScene" class="bracket-scene">
      <svg id="connectorLayer" class="connector-layer" aria-hidden="true"></svg>
      <div id="nodesLayer" class="nodes-layer"></div>
    </div>
  </main>

  <!-- Floating HUD -->
  <div class="hud-top">
    <div class="hud-title-card glass">
      <h1 class="hud-title">Bracket Map</h1>
      <p class="hud-subtitle" id="gamesCountText">March Madness 2025</p>
    </div>
  </div>

  <div class="hud-bottom-actions">
    <button id="resetViewBtn" class="fab fab--primary" type="button" aria-label="Zoom to fit">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v3M18 3h3v3M6 21H3v-3M18 21h3v-3M14 10l5-5M10 14l-5 5M10 10L5 5M14 14l5 5"/></svg>
    </button>
  </div>

  <!-- Detail Bottom Sheet -->
  <section id="detailSheet" class="bottom-sheet" aria-hidden="true">
    <div class="bottom-sheet__backdrop" id="closeDetailBackdrop"></div>
    <div class="bottom-sheet__panel glass-strong">
      <div class="bottom-sheet__drag-handle"></div>
      
      <div class="bottom-sheet__head">
        <p id="detailRound" class="eyebrow"></p>
        <button id="closeDetailBtn" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>
      
      <h3 id="detailMatchup" class="detail-matchup"></h3>

      <div class="detail-badges">
        <span id="detailWinner" class="badge badge--winner"></span>
        <span id="detailProbability" class="badge"></span>
        <span id="detailConfidence" class="badge"></span>
      </div>

      <div class="detail-content scrollable">
        <p id="detailAnalysis" class="detail-analysis text-body"></p>
        
        <div class="detail-highlight">
          <img id="detailImage" alt="" class="highlight-img" />
          <div class="highlight-info">
            <span class="eyebrow">Key Factor</span>
            <h4 id="detailTitle" class="highlight-title"></h4>
            <p id="detailCaption" class="text-caption"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="./script.js" defer></script>
</body>
</html>
